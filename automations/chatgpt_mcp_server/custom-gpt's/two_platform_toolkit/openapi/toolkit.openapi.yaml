openapi: 3.1.0
info:
  title: LeadFlow toolkit - Composio-aligned tools (your backend)
  version: 0.4.13
  description: |-
    **Custom GPT Actions — OAuth slice.** Operations: **`healthCheck`**, **`listConnections`**, **`getOAuthConnectUrls`**.

    **Tunnel:** `npm run tunnel` from `agent_arena/two_platform_toolkit`. The real origin is **`TOOLKIT_PUBLIC_URL`** in `.env` (HTTPS, no trailing slash).

    **One domain = one Action set (ChatGPT):** You cannot attach the same public host (e.g. your ngrok URL) to **two** Custom GPT Action configurations. Use **`toolkit.openapi.yaml`** (**`npm run openapi:bundle`**) in **one** GPT for OAuth + tools together. These split files are for editing in-repo, not for registering the same **`TOOLKIT_PUBLIC_URL`** twice.

    **Auth:** **`ApiKeyAuth`** only (`X-API-Key` = **`INTERNAL_API_KEY`**). Do not add **`oauth2`** schemes (GPT import error).
    Security is global in this file; **`/v1/health`** explicitly opts out with `security: []`.

    **OAuth links:** Call **`getOAuthConnectUrls`** with the human's **`user_ref`** and optional **`tenant`** / **`client`** hint; emit **`google.connectUrl`** and **`instagram.connectUrl`** in chat for browser login. Then **`listConnections`**. Tool POSTs live in **`toolkit.tools.openapi.yaml`** (or bundled **`toolkit.openapi.yaml`**).
    If provider credentials are missing, OAuth flags return false and browser login cannot complete.

    **user_ref:** Opaque string from the human only — same for OAuth, connections, and tool bodies. If missing, **`healthCheck`** then ask; never invent **`default`** / **`test`**.

    ---

    **Bundled spec** (single GPT import): combines OAuth + tools from **`toolkit.oauth.openapi.yaml`** and **`toolkit.tools.openapi.yaml`**. Edit those files, then `npm run openapi:bundle`. **ChatGPT:** register this toolkit’s public origin on **one** Custom GPT only (duplicate domain across Action sets is rejected).

    **Custom GPT Actions — tools slice.** Three Composio-shaped POSTs (Sheets append, IG reply, IG list conversations).

    **Tunnel / server URL:** Same origin as **`TOOLKIT_PUBLIC_URL`** (see **`toolkit.oauth.openapi.yaml`**).

    **One domain = one Action set (ChatGPT):** Same host cannot be registered on two GPT Action configs. Prefer bundled **`toolkit.openapi.yaml`** in a single GPT.

    **Auth:** **`X-API-Key`** = **`INTERNAL_API_KEY`**. One scheme only.
    Security is global in this file; all endpoints require `X-API-Key`.

    **Prerequisite:** Human must complete OAuth for this **`user_ref`** (use OAuth schema **`getOAuthConnectUrls`**, then **`listConnections`**) before tools succeed.

    **Responses:** `{ "successful": boolean, "data"?: object, "error"?: string }`.
servers:
  - url: https://rundown-baking-chump.ngrok-free.dev
    description: From TOOLKIT_PUBLIC_URL (npm run openapi:bundle:paste or OPENAPI_BUNDLE_USE_DOTENV_PUBLIC_URL=1). Must match server .env.
tags:
  - name: System
    description: Health and connectivity
  - name: OAuth
    description: Generate Google / Instagram login URLs; emit **connectUrl** in chat.
  - name: Tools
    description: Composio-shaped POSTs (require X-API-Key + linked accounts)
paths:
  /v1/health:
    get:
      security: []
      tags:
        - System
      operationId: healthCheck
      summary: Health check
      description: Returns service metadata. **No API key.**
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/connections:
    get:
      tags:
        - System
      operationId: listConnections
      summary: List connected providers (masked)
      description: Metadata only (no tokens). Requires real **user_ref** from chat. If unknown, skip; ask after health.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: user_ref
          in: query
          required: true
          description: Exact opaque id — same as OAuth links and tool bodies.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectionsResponse"
        "400":
          description: Missing user_ref
        "401":
          description: Invalid API key
  /v1/oauth/connect_urls:
    get:
      tags:
        - OAuth
      operationId: getOAuthConnectUrls
      summary: Generate Google & Instagram OAuth links for the human
      description: Returns **google.connectUrl** & **instagram.connectUrl** — paste for browser (**user_ref**). Optional **tenant** / **client** select tenant credentials. If **configured** is false, **connectUrl** returns `null` (fail-fast; no doomed redirect link). See **OAuthConnectUrlsResponse**.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: user_ref
          in: query
          required: true
          description: Opaque id — same for **listConnections** and tool bodies.
          schema:
            type: string
        - name: tenant
          in: query
          required: false
          description: Optional tenant/workspace hint for runtime OAuth app credential selection.
          schema:
            type: string
        - name: client
          in: query
          required: false
          description: Optional client/account hint for runtime OAuth app credential selection.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthConnectUrlsResponse"
        "400":
          description: Missing user_ref
        "401":
          description: Invalid API key
        "503":
          description: TOOLKIT_PUBLIC_URL not configured on server
  /v1/debug/config:
    get:
      tags:
        - System
      operationId: debugConfig
      summary: Server config diagnostics (API key required)
      description: Returns non-secret booleans for API key/public URL/OAuth env setup to debug failing Actions quickly.
      parameters:
        - name: user_ref
          in: query
          required: false
          description: Optional opaque user id to resolve tenant/client-aware OAuth configuration.
          schema:
            type: string
        - name: tenant
          in: query
          required: false
          description: Optional tenant/workspace hint for runtime OAuth app credential resolution.
          schema:
            type: string
        - name: client
          in: query
          required: false
          description: Optional client/account hint for runtime OAuth app credential resolution.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugConfigResponse"
        "401":
          description: Invalid API key
  /v1/tools/googlesheets_append_row:
    post:
      tags:
        - Tools
      operationId: googlesheets_append_row
      summary: Append values to a spreadsheet (Composio GOOGLESHEETS_SPREADSHEETS_VALUES_APPEND)
      description: Append **values** after last table row for **range**; Composio field names. Linked Google **user_ref** required — see request schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GooglesheetsSpreadsheetsValuesAppendRequest"
      responses:
        "200":
          description: Success or logical failure (check `successful`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Validation / no Google connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "401":
          description: API key or expired Google token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "502":
          description: Upstream Google error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
  /v1/tools/instagram_send_reply:
    post:
      tags:
        - Tools
      operationId: instagram_send_reply
      summary: Send Instagram DM text (Composio INSTAGRAM_SEND_TEXT_MESSAGE)
      description: Text DM in existing thread; Composio **INSTAGRAM_SEND_TEXT_MESSAGE**. **ig_user_id** optional. Linked IG **user_ref** — see schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramSendTextMessageRequest"
      responses:
        "200":
          description: Success or logical failure (check `successful`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Validation / no Instagram connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "401":
          description: API key or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "502":
          description: Upstream Meta error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
  /v1/tools/instagram_list_recent_conversations:
    post:
      tags:
        - Tools
      operationId: instagram_list_recent_conversations
      summary: List Instagram DM conversations (Composio INSTAGRAM_LIST_ALL_CONVERSATIONS)
      description: IG DM threads; optional **messages_limit**. OAuth **user_ref** if IG not linked yet (OAuth schema).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramListAllConversationsRequest"
      responses:
        "200":
          description: Success or logical failure (check `successful`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Validation / no connection / cannot resolve IG user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "401":
          description: API key or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "502":
          description: Upstream Meta error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Same as **`INTERNAL_API_KEY`**. Only scheme in this file.
  schemas:
    HealthResponse:
      type: object
      description: Matches `GET /v1/health` JSON from `server.ts`.
      required:
        - ok
        - service
        - publicUrlConfigured
        - publicBase
        - oauth
        - tools
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: two_platform_toolkit
        publicUrlConfigured:
          type: boolean
        publicBase:
          nullable: true
          type: string
          description: "**`TOOLKIT_PUBLIC_URL`** (no trailing slash). OAuth links built at request time."
        oauth:
          type: object
          required:
            - note
            - google
            - instagram
            - connections
          properties:
            note:
              type: string
            google:
              type: object
              required:
                - configured
                - connectUrlTemplate
              properties:
                configured:
                  type: boolean
                  description: False means GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET are missing on server.
                connectUrlTemplate:
                  nullable: true
                  type: string
            instagram:
              type: object
              required:
                - configured
                - connectUrlTemplate
              properties:
                configured:
                  type: boolean
                  description: False means META_APP_ID / META_APP_SECRET are missing on server.
                connectUrlTemplate:
                  nullable: true
                  type: string
            callbackPattern:
              nullable: true
              type: string
            connections:
              type: string
        tools:
          type: object
          required:
            - note
            - oauth_connect_urls
            - googlesheets_append_row
            - instagram_send_reply
            - instagram_list_recent_conversations
          properties:
            note:
              type: string
            oauth_connect_urls:
              type: string
            googlesheets_append_row:
              type: string
            instagram_send_reply:
              type: string
            instagram_list_recent_conversations:
              type: string
    ListConnectionsResponse:
      type: object
      required:
        - ok
        - user_ref
        - connections
      properties:
        ok:
          type: boolean
        user_ref:
          type: string
        connections:
          type: array
          items:
            type: object
            additionalProperties: true
    OAuthConnectUrlsResponse:
      type: object
      description: Emit **google.connectUrl** and **instagram.connectUrl** in the reply. No secrets. Built from **TOOLKIT_PUBLIC_URL**.
      required:
        - ok
        - user_ref
        - publicBase
        - note
        - google
        - instagram
      properties:
        ok:
          type: boolean
          description: When true, **connectUrl** values are valid HTTPS URLs.
        user_ref:
          type: string
        publicBase:
          type: string
        note:
          type: string
        google:
          type: object
          required:
            - configured
            - connectUrl
          description: Google OAuth start for this **user_ref**.
          properties:
            configured:
              type: boolean
              description: False means GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET are missing on server.
            connectUrl:
              nullable: true
              type: string
              description: Paste for human — Google login for this toolkit. Null when configuration is invalid/missing.
        instagram:
          type: object
          required:
            - configured
            - connectUrl
          description: Instagram OAuth start for this **user_ref**.
          properties:
            configured:
              type: boolean
              description: False means META_APP_ID / META_APP_SECRET are missing on server.
            connectUrl:
              nullable: true
              type: string
              description: Paste for human — Instagram login for this toolkit. Null when configuration is invalid/missing.
    DebugConfigResponse:
      type: object
      required:
        - ok
        - service
        - checks
      properties:
        ok:
          type: boolean
        service:
          type: string
        checks:
          type: object
          required:
            - apiKeyConfigured
            - toolkitPublicUrlConfigured
            - googleOAuthConfigured
            - instagramOAuthConfigured
          properties:
            apiKeyConfigured:
              type: boolean
            toolkitPublicUrlConfigured:
              type: boolean
            googleOAuthConfigured:
              type: boolean
            instagramOAuthConfigured:
              type: boolean
        publicBase:
          nullable: true
          type: string
        next:
          type: array
          items:
            type: string
    ToolResponse:
      type: object
      description: Composio-style tool result envelope.
      required:
        - successful
      properties:
        successful:
          type: boolean
        data:
          nullable: true
          type: object
          additionalProperties: true
        error:
          type: string
    ComposioValuesRow:
      type: array
      description: One row of cells (strings, numbers, booleans, or null for empty).
      items:
        nullable: true
        oneOf:
          - type: string
          - type: number
          - type: boolean
    GooglesheetsSpreadsheetsValuesAppendRequest:
      type: object
      description: |
        **`user_ref`** required by this backend. Other fields match Composio **`GOOGLESHEETS_SPREADSHEETS_VALUES_APPEND`**.
        **OAuth:** Call **`getOAuthConnectUrls`** on the OAuth Actions schema; human opens **google.connectUrl**; then **`listConnections`** before this tool.
      required:
        - user_ref
        - spreadsheetId
        - range
        - values
        - valueInputOption
      properties:
        user_ref:
          type: string
          description: |
            Opaque key from chat — **same** as Google OAuth link and **`/v1/connections`**. Never default, placeholders, or guesses.
        spreadsheetId:
          type: string
          description: |
            Spreadsheet ID (typically ~44 chars). URL segment between **`/d/`** and **`/edit`**. Composio **`spreadsheetId`**.
        range:
          type: string
          description: |
            A1 range locating the logical table (e.g. **`Sheet1`**, **`Sheet1!A:D`**). New rows append after the last row of that table within the range. Sheet must exist.
        values:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ComposioValuesRow"
          description: |
            2D array of values; each inner array is typically **one row** (majorDimension **ROWS**). Use **null** for empty cells.
        majorDimension:
          type: string
          enum:
            - ROWS
            - COLUMNS
          description: Composio **`majorDimension`**.
        insertDataOption:
          type: string
          enum:
            - OVERWRITE
            - INSERT_ROWS
          description: Composio **`insertDataOption`**.
        valueInputOption:
          type: string
          enum:
            - RAW
            - USER_ENTERED
          description: Composio **`valueInputOption`** (required in Composio docs).
        includeValuesInResponse:
          type: boolean
          description: Composio **`includeValuesInResponse`**.
        responseValueRenderOption:
          type: string
          enum:
            - FORMATTED_VALUE
            - UNFORMATTED_VALUE
            - FORMULA
          description: Composio **`responseValueRenderOption`**.
        responseDateTimeRenderOption:
          type: string
          enum:
            - SERIAL_NUMBER
            - FORMATTED_STRING
          description: Composio **`responseDateTimeRenderOption`**.
      additionalProperties: false
    InstagramSendTextMessageRequest:
      type: object
      description: |
        **`user_ref`** required. Other fields match Composio **`INSTAGRAM_SEND_TEXT_MESSAGE`**.
        **OAuth:** **`getOAuthConnectUrls`** → human opens **instagram.connectUrl** → **`listConnections`**.
      required:
        - user_ref
        - text
        - recipient_id
      properties:
        user_ref:
          type: string
          description: |
            Opaque key from chat — **same** as Instagram OAuth link and **`/v1/connections`**. Never default, placeholders, or guesses.
        text:
          type: string
          minLength: 1
          maxLength: 1000
          description: Message text to send (Composio **`text`**).
        recipient_id:
          type: string
          minLength: 1
          description: |
            Recipient PSID / Instagram-scoped ID from **`instagram_list_recent_conversations`** or webhooks (Composio **`recipient_id`**).
        ig_user_id:
          type: string
          minLength: 1
          description: Instagram Business Account ID (Composio **`ig_user_id`**). Optional; server may resolve via **`/me`**.
        graph_api_version:
          type: string
          description: Composio **`graph_api_version`** (e.g. **`v21.0`**). Defaults from server env if omitted.
        reply_to_message_id:
          type: string
          minLength: 1
          description: Message id (**mid**) for a threaded reply (Composio **`reply_to_message_id`**).
      additionalProperties: false
    InstagramListAllConversationsRequest:
      type: object
      description: |
        **`user_ref`** required. Core fields match Composio **`INSTAGRAM_LIST_ALL_CONVERSATIONS`**;
        **`messages_limit`** is **backend-only** convenience for nested messages.
        **OAuth:** **`getOAuthConnectUrls`** / **instagram.connectUrl** if not yet linked.
      required:
        - user_ref
      properties:
        user_ref:
          type: string
          description: |
            Opaque key from chat — **same** as Instagram OAuth link and **`/v1/connections`**. Never default, placeholders, or guesses.
        after:
          type: string
          description: Pagination cursor (**`paging.cursors.after`**) (Composio **`after`**).
        limit:
          type: integer
          minimum: 1
          description: Maximum number of **conversations** (Composio **`limit`**). Server default **10** if omitted.
        ig_user_id:
          type: string
          description: Instagram Business Account ID (Composio **`ig_user_id`**). Optional; server may resolve from token.
        graph_api_version:
          type: string
          description: Composio **`graph_api_version`**.
        messages_limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 8
          description: |
            **Not in Composio LIST_ALL_CONVERSATIONS.** Max messages embedded per thread (Graph **`messages.limit(n)`**).
      additionalProperties: false
